; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env:esp32-s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

; Use a board with more PSRAM if doing heavy LVGL
; board = esp32-s3-devkitc-1
; board_build.arduino.memory_type = qio_opi  ; for some S3 with PSRAM

build_flags =
    -D CORE_DEBUG_LEVEL=3
    ; -D LV_CONF_INCLUDE_SIMPLE
    -D CONFIG_BT_NIMBLE_ENABLED=1

lib_deps =
    ; VESC UART (great for quick start)
    https://github.com/SolidGeek/VescUart.git

    ; BLE - NimBLE is preferred for resource usage
    h2zero/NimBLE-Arduino@^1.4.0

    ; Choose one graphics stack. Examples:
    ; https://github.com/Bodmer/TFT_eSPI
    ; https://github.com/lovyan03/LovyanGFX
    ; LVGL + driver

    ; LVGL (uncomment when you have display driver ready)
    ; lvgl/lvgl@^9.2.0

    ; Example display libs (pick and configure)
    ; bodmer/TFT_eSPI@^2.5.0
    ; lovyan03/LovyanGFX@^1.1.9

; If using LVGL you usually need a lv_conf.h and display driver
; extra_scripts = pre:extra_script.py

[env:esp32-c3]
platform = espressif32
board = esp32-c3-devkitm-1
framework = arduino
monitor_speed = 115200

lib_deps =
    https://github.com/SolidGeek/VescUart.git
    h2zero/NimBLE-Arduino@^1.4.0
