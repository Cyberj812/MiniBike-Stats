name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-firmware:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        env: [esp32-s3, esp32-c3]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build ${{ matrix.env }}
        working-directory: firmware
        run: pio run -e ${{ matrix.env }}

      - name: Rename artifact
        run: |
          mkdir -p release-artifacts
          cp firmware/.pio/build/${{ matrix.env }}/firmware.bin release-artifacts/MiniBikeStats-${{ matrix.env }}.bin || true
          cp firmware/.pio/build/${{ matrix.env }}/firmware.elf release-artifacts/MiniBikeStats-${{ matrix.env }}.elf || true

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-${{ matrix.env }}
          path: release-artifacts/

  build-mobile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
          cache: true

      - name: Get deps & build APK
        working-directory: mobile
        run: |
          flutter pub get
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MiniBikeStats-Android
          path: mobile/build/app/outputs/flutter-apk/app-release.apk

  create-release:
    needs: [build-firmware, build-mobile]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MiniBike Stats ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            release-artifacts/**/*.bin
            release-artifacts/**/*.elf
            release-artifacts/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
