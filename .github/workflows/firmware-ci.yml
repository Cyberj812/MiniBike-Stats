name: Firmware CI

on:
  push:
    branches: [ main ]
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'firmware/**'
      - '.github/workflows/firmware-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        env: [esp32-s3, esp32-c3]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/pip
            ~/.platformio
          key: ${{ runner.os }}-pio-${{ matrix.env }}-${{ hashFiles('firmware/platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: |
          python -m pip install --upgrade pip
          pip install platformio

      - name: Build firmware
        working-directory: firmware
        run: |
          pio run -e ${{ matrix.env }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: MiniBikeStats-firmware-${{ matrix.env }}
          path: |
            firmware/.pio/build/${{ matrix.env }}/*.bin
            firmware/.pio/build/${{ matrix.env }}/*.elf
          retention-days: 14

  # Future: add size analysis, unit tests (if any), etc.
